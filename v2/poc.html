<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPay WebView Diagnostic</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #101418;
            color: #e8f5e9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .card {
            width: min(560px, 100%);
            background: #172026;
            border: 1px solid #24323b;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 22px;
        }

        p {
            margin: 0 0 14px;
            color: #b8c7d0;
            line-height: 1.5;
        }

        .ok {
            color: #2dd36f;
            font-weight: 700;
        }

        .kv {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 12px;
            background: #0f161b;
            border: 1px solid #24323b;
            border-radius: 10px;
            padding: 10px;
            margin-top: 8px;
            word-break: break-all;
        }
    </style>
</head>

<body>
    <main class="card">
        <h1>WebView loaded ✅</h1>
        <p class="ok">If you can see this page inside OPay, the deep link worked.</p>
        <p>This is a safe diagnostic page with no data collection.</p>
        <div class="kv" id="diag">Loading diagnostics…</div>
    </main>

    <script>
        var diag = {
            href: window.location.href,
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent,
            referrer: document.referrer || '(none)'
        };
        document.getElementById('diag').textContent = JSON.stringify(diag, null, 2);
    </script>
</body>

</html>
